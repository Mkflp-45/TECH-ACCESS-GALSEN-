<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Migration vers Firebase</title>
</head>
<body>
    <h1>Migration des produits vers Firebase</h1>
    <button onclick="migrateProducts()">Migrer les produits</button>
    <div id="status"></div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js"></script>

    <script>
        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyBEyZ7Lr79bRfLTyezU3lGp6QfapnFBSt4",
            authDomain: "tech-acces-galsen.firebaseapp.com",
            projectId: "tech-acces-galsen",
            storageBucket: "tech-acces-galsen.firebasestorage.app",
            messagingSenderId: "586222995096",
            appId: "1:586222995096:web:ce3fb1e384b2e69ca032ed",
            measurementId: "G-735V82LY58"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // Produits d'exemple à migrer
        const sampleProducts = [
            {
                id: "volt-pro-20k",
                name: "Volt Pro 20000",
                price: 45000,
                category: 1,
                icon: "⚡",
                image: "",
                description: "20 000mAh · Charge rapide 65W · 3 ports USB"
            },
            {
                id: "coque-iphone-15",
                name: "Coque iPhone 15",
                price: 15000,
                category: 2,
                icon: "🛡️",
                image: "",
                description: "Protection complète · Anti-chute · Design élégant"
            },
            {
                id: "cable-usb-c-2m",
                name: "Câble USB-C 2m",
                price: 8000,
                category: 3,
                icon: "🔌",
                image: "",
                description: "Charge rapide · Certifié MFi · Longueur 2m"
            },
            {
                id: "powerbank-10000",
                name: "Powerbank 10000mAh",
                price: 25000,
                category: 1,
                icon: "🔋",
                image: "",
                description: "10 000mAh · Charge rapide 18W · Compact"
            },
            {
                id: "coque-samsung-s24",
                name: "Coque Samsung S24",
                price: 12000,
                category: 2,
                icon: "📱",
                image: "",
                description: "Protection écran · Anti-rayures · Léger"
            },
            {
                id: "casque-bluetooth",
                name: "Casque Bluetooth",
                price: 35000,
                category: 4,
                icon: "🎧",
                image: "",
                description: "Son haute qualité · Autonomie 30h · Réduction bruit"
            }
        ];

        async function migrateProducts() {
            const status = document.getElementById('status');
            status.innerHTML = 'Migration en cours...';

            try {
                // Vérifier s'il y a des données locales à migrer
                const localData = localStorage.getItem('techAccessData');
                let productsToMigrate = sampleProducts;

                if (localData) {
                    const parsed = JSON.parse(localData);
                    if (parsed.products && parsed.products.length > 0) {
                        productsToMigrate = parsed.products;
                        status.innerHTML += '<br>✅ Données locales trouvées, migration en cours...';
                    }
                }

                // Ajouter chaque produit à Firestore
                for (const product of productsToMigrate) {
                    const productData = {
                        name: product.name,
                        price: product.price,
                        category: product.category,
                        icon: product.icon,
                        image: product.image || '',
                        description: product.description || ''
                    };

                    if (product.id && typeof product.id === 'string') {
                        // Utiliser l'ID existant
                        await db.collection('products').doc(product.id).set(productData);
                    } else {
                        // Générer un nouvel ID
                        const docRef = await db.collection('products').add(productData);
                        console.log('Produit ajouté avec ID:', docRef.id);
                    }
                }

                status.innerHTML = `✅ Migration terminée ! ${productsToMigrate.length} produits ajoutés à Firestore.`;
                console.log('Migration réussie');

            } catch (error) {
                status.innerHTML = `❌ Erreur lors de la migration: ${error.message}`;
                console.error('Erreur migration:', error);
            }
        }

        // Auto-migration au chargement si pas de produits dans Firestore
        window.addEventListener('load', async () => {
            try {
                const querySnapshot = await db.collection('products').get();
                if (querySnapshot.empty) {
                    console.log('Aucun produit trouvé, migration automatique...');
                    migrateProducts();
                } else {
                    document.getElementById('status').innerHTML = `✅ ${querySnapshot.size} produits déjà présents dans Firestore.`;
                }
            } catch (error) {
                console.error('Erreur vérification Firestore:', error);
            }
        });
    </script>
</body>
</html>
