<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Facture — TECH ACCESS</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700&family=Bebas+Neue&family=Space+Mono&display=swap" rel="stylesheet">
<style>
  body { font-family: "DM Sans", sans-serif; background: #f0f0f0; padding: 40px 20px; color: #333; }
  .invoice-card { background: white; max-width: 800px; margin: 0 auto; padding: 60px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-radius: 8px; }
  .header { display: flex; justify-content: space-between; margin-bottom: 60px; border-bottom: 2px solid #0D47A1; padding-bottom: 20px; }
  .shop-info h1 { font-family: "Bebas Neue", sans-serif; font-size: 2.5rem; letter-spacing: 2px; color: #0D47A1; margin: 0; }
  .shop-info p { margin: 5px 0; font-size: 0.9rem; color: #666; }
  .invoice-meta { text-align: right; }
  .invoice-meta h2 { font-family: "Bebas Neue", sans-serif; font-size: 2rem; margin: 0; color: #333; }
  .invoice-meta p { margin: 5px 0; font-family: "Space Mono", monospace; font-size: 0.85rem; }
  .details-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; margin-bottom: 40px; }
  .detail-box h3 { font-family: "Space Mono", monospace; font-size: 0.75rem; text-transform: uppercase; color: #0D47A1; border-bottom: 1px solid #eee; padding-bottom: 10px; margin-bottom: 15px; }
  table { width: 100%; border-collapse: collapse; margin-bottom: 40px; }
  th { text-align: left; font-family: "Space Mono", monospace; font-size: 0.75rem; padding: 15px 0; border-bottom: 2px solid #eee; }
  td { padding: 15px 0; border-bottom: 1px solid #f9f9f9; }
  .totals { margin-left: auto; width: 300px; }
  .total-row.grand { border-top: 2px solid #0D47A1; margin-top: 10px; padding-top: 15px; font-weight: 700; font-size: 1.2rem; color: #0D47A1; display: flex; justify-content: space-between; }
  .footer { text-align: center; margin-top: 60px; font-size: 0.85rem; color: #999; }
  .btn-print { background: #0D47A1; color: white; padding: 12px 24px; border-radius: 4px; border: none; cursor: pointer; font-family: "Space Mono", monospace; margin: 0 auto 20px; display: block; }
  @media print { .btn-print { display: none; } body { background: white; padding: 0; } .invoice-card { box-shadow: none; } }
</style>
<script src="https://www.gstatic.com/firebasejs/11.0.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore-compat.js"></script>
</head>
<body>
<button class="btn-print" onclick="window.print()">🖨️ Télécharger / Imprimer en PDF</button>
<div class="invoice-card">
  <div class="header">
    <div class="shop-info">
      <h1>TECH ACCESS</h1>
      <p>Accessoires Premium & Tech</p>
      <p>Dakar Plateau, Sénégal</p>
      <p>+221 77 363 15 95</p>
    </div>
    <div class="invoice-meta">
      <h2>FACTURE</h2>
      <p>N° : <span id="invId">...</span></p>
      <p>Date : <span id="invDate">...</span></p>
    </div>
  </div>
  <div class="details-grid">
    <div class="detail-box">
      <h3>Facturé à</h3>
      <p><strong id="custName">...</strong></p>
      <p id="custQuartier">...</p>
      <p id="custTel">...</p>
    </div>
    <div class="detail-box">
      <h3>Statut du Paiement</h3>
      <p id="invStatus" style="font-weight: 700; color: #E65100;">En attente (Wave)</p>
    </div>
  </div>
  <table>
    <thead>
      <tr><th>Description</th><th>Qté</th><th>Prix Unit.</th><th>Total</th></tr>
    </thead>
    <tbody id="itemsBody"></tbody>
  </table>
  <div class="totals">
    <div class="total-row grand"><span>TOTAL</span><span id="grandTotal">...</span></div>
  </div>
  <div class="footer"><p>Merci pour votre confiance chez TECH ACCESS !</p></div>
</div>
<script>
  const firebaseConfig = {
    apiKey: "AIzaSyBEyZ7Lr79bRfLTyezU3lGp6QfapnFBSt4",
    authDomain: "tech-acces-galsen.firebaseapp.com",
    projectId: "tech-acces-galsen",
    storageBucket: "tech-acces-galsen.firebasestorage.app",
    messagingSenderId: "586222995096",
    appId: "1:586222995096:web:ce3fb1e384b2e69ca032ed"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();
  async function loadInvoice() {
    const urlParams = new URLSearchParams(window.location.search);
    const orderId = urlParams.get('id');
    if (!orderId) return;
    try {
      const doc = await db.collection('orders').doc(orderId).get();
      if (!doc.exists) return;
      const order = doc.data();
      const date = order.timestamp ? order.timestamp.toDate() : new Date();
      document.getElementById('invId').textContent = orderId.substring(0, 8).toUpperCase();
      document.getElementById('invDate').textContent = date.toLocaleDateString('fr-FR');
      document.getElementById('custName').textContent = `${order.customer.firstName} ${order.customer.name}`;
      document.getElementById('custQuartier').textContent = order.customer.quartier;
      document.getElementById('custTel').textContent = order.customer.whatsapp;
      document.getElementById('itemsBody').innerHTML = order.items.map(item => `
        <tr><td>${item.name}</td><td>${item.qty}</td><td>${item.price.toLocaleString()} FCFA</td><td>${(item.price * item.qty).toLocaleString()} FCFA</td></tr>
      `).join('');
      document.getElementById('grandTotal').textContent = order.total.toLocaleString() + ' FCFA';
    } catch (e) { console.error(e); }
  }
  loadInvoice();
</script>
</body>
</html>
