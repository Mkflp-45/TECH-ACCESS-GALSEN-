<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Produits TECH ACCESS</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .test-result { padding: 10px; margin: 10px 0; border-radius: 5px; }
        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .warning { background: #fff3cd; color: #856404; border: 1px solid #ffeaa7; }
        pre { background: #f8f9fa; padding: 10px; border-radius: 5px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>🔍 Test de Chargement des Produits</h1>

    <div id="results"></div>

    <script src="https://www.gstatic.com/firebasejs/11.0.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore-compat.js"></script>

    <script>
        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyBEyZ7Lr79bRfLTyezU3lGp6QfapnFBSt4",
            authDomain: "tech-acces-galsen.firebaseapp.com",
            projectId: "tech-acces-galsen",
            storageBucket: "tech-acces-galsen.firebasestorage.app",
            messagingSenderId: "586222995096",
            appId: "1:586222995096:web:ce3fb1e384b2e69ca032ed",
            measurementId: "G-735V82LY58"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const results = document.getElementById('results');

        function addResult(message, type = 'info') {
            const div = document.createElement('div');
            div.className = `test-result ${type}`;
            div.innerHTML = `<strong>${new Date().toLocaleTimeString()}:</strong> ${message}`;
            results.appendChild(div);
            console.log(`[${type.toUpperCase()}] ${message}`);
        }

        async function testFirestoreConnection() {
            addResult('🔄 Test de connexion Firestore...', 'warning');

            try {
                const testDoc = await db.collection('test').doc('connection').get();
                addResult('✅ Connexion Firestore réussie', 'success');
                return true;
            } catch (error) {
                addResult(`❌ Erreur Firestore: ${error.message}`, 'error');
                addResult(`Code d'erreur: ${error.code}`, 'error');
                return false;
            }
        }

        async function testProductsLoading() {
            addResult('🔄 Test de chargement des produits...', 'warning');

            try {
                const querySnapshot = await db.collection('products').get();

                if (querySnapshot.empty) {
                    addResult('⚠️ Aucun produit trouvé dans Firestore', 'warning');
                    return [];
                }

                const products = [];
                querySnapshot.forEach(doc => {
                    const data = doc.data() || {};
                    products.push({
                        id: doc.id,
                        name: data.name || 'Sans nom',
                        price: data.price || 0,
                        category: data.category || 'Autre'
                    });
                });

                addResult(`✅ ${products.length} produit(s) chargé(s) depuis Firestore`, 'success');

                products.forEach(p => {
                    addResult(`📦 ${p.name} (${p.id}) - ${p.price}€`, 'success');
                });

                return products;

            } catch (error) {
                addResult(`❌ Erreur chargement produits: ${error.message}`, 'error');
                return [];
            }
        }

        async function testLocalStorage() {
            addResult('🔄 Test localStorage...', 'warning');

            try {
                const saved = localStorage.getItem('techAccessData');
                if (saved) {
                    const data = JSON.parse(saved);
                    const products = data.products || [];
                    addResult(`✅ ${products.length} produit(s) dans localStorage`, 'success');
                    return products;
                } else {
                    addResult('⚠️ Aucun donnée dans localStorage', 'warning');
                    return [];
                }
            } catch (error) {
                addResult(`❌ Erreur localStorage: ${error.message}`, 'error');
                return [];
            }
        }

        async function runTests() {
            addResult('🚀 Démarrage des tests...', 'warning');

            // Test 1: Connexion Firestore
            const firestoreOk = await testFirestoreConnection();

            // Test 2: Chargement produits Firestore
            const firestoreProducts = await testProductsLoading();

            // Test 3: localStorage
            const localProducts = await testLocalStorage();

            // Analyse finale
            addResult('<hr>', 'info');
            addResult('📊 ANALYSE FINALE:', 'warning');

            if (firestoreOk && firestoreProducts.length > 0) {
                addResult('✅ Produits chargés depuis Firestore - DÉPLOIEMENT OK', 'success');
            } else if (localProducts.length > 0) {
                addResult('⚠️ Produits chargés depuis localStorage - FIRESTORE BLOQUÉ', 'warning');
            } else {
                addResult('❌ AUCUN PRODUIT CHARGÉ - PROBLÈME GRAVE', 'error');
            }

            if (!firestoreOk) {
                addResult('<br>🔍 CAUSES POSSIBLES:', 'info');
                addResult('• Bloqueur de pubs (uBlock, AdBlock)', 'info');
                addResult('• Firewall d\'entreprise', 'info');
                addResult('• Réseau restreint', 'info');
                addResult('• CORS policy', 'info');
            }
        }

        // Lancer les tests au chargement
        window.addEventListener('load', () => {
            setTimeout(runTests, 1000); // Attendre que Firebase soit prêt
        });
    </script>
</body>
</html>
